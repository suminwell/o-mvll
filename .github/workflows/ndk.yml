name: 'O-MVLL NDK'

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Get deployment version
        id: versioning
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="0-1-0"
          else
            LATEST_TAG="${LATEST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            NEXT_VERSION="${MAJOR}-$((MINOR + 1))-0"
          fi
          RELEASE_TAG="omvll-ndk-r29-v${NEXT_VERSION}"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
      - name: Install LLVM 21
        shell: bash
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 21
          sudo apt-get update
          sudo apt-get install -y clang-21 lld-21 llvm-21-dev libclang-21-dev libc++-21-dev libc++abi-21-dev ninja-build cmake
      - name: O-MVLL Android NDK r29
        shell: bash
        run: |
          curl -LO https://open-obfuscator.build38.io/static/omvll-deps-ndk-r26d.tar
          mkdir -p /tmp/third-party-ndk
          tar xvf ./omvll-deps-ndk-r26d.tar --directory=/tmp/third-party-ndk
          mkdir -p dist
          curl -LO https://www.python.org/ftp/python/3.10.7/Python-3.10.7.tgz
          tar xzvf Python-3.10.7.tgz --directory=${{ github.workspace }}/dist
          THIRD_PARTY_DIR=/tmp/third-party-ndk scripts/docker/ndk_r29_compile.sh
      - name: Generate deployment tar
        uses: a7ul/tar-action@v1.1.3
        id: compress
        with:
          command: c
          cwd: ${{ github.workspace }}/dist/
          files: |
            ./omvll-ndk-r29.so
            ./libc++.so.1
            ./libc++abi.so.1
            ./sample-omvll-config.py
            ./Python-3.10.7
          outPath: ${{ github.workspace }}/dist/omvll_v${{ steps.versioning.outputs.next_version }}_linux.tar.gz
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.versioning.outputs.release_tag }}
          RELEASE_NAME: O-MVLL NDK r29 ${{ steps.versioning.outputs.next_version }}
          RELEASE_ASSET: ${{ github.workspace }}/dist/omvll_v${{ steps.versioning.outputs.next_version }}_linux.tar.gz
        shell: bash
        run: |
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          gh release create "$RELEASE_TAG" "$RELEASE_ASSET" \
            --title "$RELEASE_NAME" \
            --notes "O-MVLL plugin built for LLVM 21 / Android NDK r29."
